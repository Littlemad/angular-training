<div class="page">
    <div class="container">
        <div class="top-content">
            <div class="top-content__title">
                <h1 class="h1 h1--margin">Tabletop</h1>
                <p>A simple app to count games</p>
            </div>
            <div class="top-content__aside">
                <button icon name="plus" altText="Add content"></button>
            </div>
        </div>
        <tabpanel>
            <ng-template #tabTitle>Players</ng-template>
            <ng-template #tabContent>
                <p>List of all players</p>
                <list [listArray]="allPlayers()"></list>
            </ng-template>

            <ng-template #tabTitle>Games</ng-template>
            <ng-template #tabContent>
                <p>List of all games</p>
                <list [listArray]="allGamesNames()"></list>
            </ng-template>

            <ng-template #tabTitle>Event</ng-template>
            <ng-template #tabContent>
                <p>Dates</p>
                <list [listArray]="allSessionDates()"></list>
            </ng-template>

            <ng-template #tabTitle>Winners</ng-template>
            <ng-template #tabContent>
                <p>Times each player won (most wins first)</p>
                <list [listArray]="winnerLeaderboard()"></list>
            </ng-template>
        </tabpanel>

        <div class="tabletop-app">
            <h2 class="h2">List of events</h2>
            <p>Information about the event, players, games and results</p>
            <div class="tabletop-app__event">
                <table class="table tabletop-app__event__table">
                    <tr>
                        <th>Date</th>
                        <th>Game</th>
                        <th>Players</th>
                        <th>Results</th>
                    </tr>
                    <tr>
                        <td>{{ currentDate() }}</td>
                        <td><list [listArray]="currentResultGamesNames()"></list></td>
                        <td><list [listArray]="currentPlayers()"></list></td>
                        <td><list [listArray]="currentResultWinnersNames()"></list></td>
                    </tr>
                </table>
                <nav class="tabletop-app__event__navigation">
                    <button (click)="clickPrevEvent()">Previous Event</button>
                    <button (click)="clickNextEvent()">Next Event</button>
                </nav>
            </div>
        </div>
    </div>
</div>
